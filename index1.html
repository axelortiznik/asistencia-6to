<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - 6to 3ra</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .success { background-color: #dcfce7; color: #166534; display: block; }
        .error { background-color: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Asistencia 6to 3ra</h2>
    
    <form id="attendanceForm">
        <!-- Selector de Alumnos -->
        <div class="form-group">
            <label for="studentName">Seleccioná tu Nombre:</label>
            <select id="studentName" required>
                <option value="" disabled selected>Elegí tu nombre...</option>
                <!-- Agrega acá abajo todos los alumnos del curso uno por uno -->
                <option value="Alvarez, Juan">Alvarez, Juan</option>
                <option value="Gomez, Maria">Gomez, Maria</option>
                <option value="Lopez, Carlos">Lopez, Carlos</option>
                <option value="Rodriguez, Sofia">Rodriguez, Sofia</option>
                <!-- Podés copiar y pegar la línea de arriba para meter a todo el curso -->
            </select>
        </div>

        <!-- Número de PC -->
        <div class="form-group">
            <label for="pcNumber">Número de PC donde estás sentado:</label>
            <input type="number" id="pcNumber" min="1" max="30" placeholder="Ej: 12" required>
        </div>

        <!-- Código de Validación -->
        <div class="form-group">
            <label for="validationCode">Código de Aula (Mirá el pizarrón):</label>
            <input type="text" id="validationCode" placeholder="Ingresá el código de hoy" required>
        </div>

        <button type="submit" id="btnSubmit">Registrar Presente</button>
    </form>

    <div id="responseMessage" class="message"></div>
</div>

<script>
    // REEMPLAZÁ ESTA URL CON LA QUE TE DIO GOOGLE APPS SCRIPT EN EL PASO 3
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrKCldS__kwMGCLUJqzNMIXSbVMvtRkuUqHFS2TQ3MemIhG_Yn4FB3qIeHTCUCUxnt/exec";

    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página se recargue
        
        const btn = document.getElementById('btnSubmit');
        const msgDiv = document.getElementById('responseMessage');
        
        // Bloquear el botón mientras carga para evitar doble clic
        btn.disabled = true;
        btn.innerText = "Enviando...";
        msgDiv.className = "message";
        msgDiv.style.display = "none";

        // Capturar los valores del formulario
        const payload = {
            nombre: document.getElementById('studentName').value,
            pc: document.getElementById('pcNumber').value,
            codigo: document.getElementById('validationCode').value
        };

        // Enviar datos al backend de Google
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Evita problemas de CORS con Google Scripts
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            // Como usamos 'no-cors', no podemos leer la respuesta JSON directamente,
            // pero si entra acá significa que el servidor web de Google recibió los datos.
            msgDiv.innerText = "¡Procesado! Revisá con el profesor si figura tu presente.";
            msgDiv.classList.add('success');
            document.getElementById('attendanceForm').reset();
        })
        .catch(error => {
            msgDiv.innerText = "Error de conexión. Intentá de nuevo.";
            msgDiv.classList.add('error');
            console.error(error);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Registrar Presente";
        });
    });
</script>

</body>
</html>
